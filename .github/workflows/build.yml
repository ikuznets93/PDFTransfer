name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ] # Запускать сборку при отправке кода в эти ветки
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой на сайте

jobs:
  build:
    runs-on: windows-latest # Запуск на чистой, полноценной Windows

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Полноценная версия Python, где точно есть tkinter

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --noconsole PDFTransfer.py

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PDF-Transfer-Tool
        path: dist/PDFTransfer.exe